<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sân Cầu Lông - Tính Tiền Vãng Lai</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-12">

    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-shuttlecock text-amber-400"></i>
                Badminton Splitter
            </h1>
            <span class="text-xs bg-indigo-700 px-3 py-1 rounded-full border border-indigo-500">Tính tiền ca vãng lai</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-md font-semibold text-slate-900 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i class="fa-solid fa-clock text-indigo-500"></i> Thông tin ca chơi
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">TỔNG TIỀN SÂN (đ)</label>
                        <input type="number" id="courtPrice" value="200000" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Ví dụ: 200000">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">TỔNG TIỀN CẦU CHUNG (đ)</label>
                        <input type="number" id="shuttlePrice" value="100000" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Ví dụ: 100000">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">GIỜ BẮT ĐẦU</label>
                            <input type="time" id="startTime" value="18:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">GIỜ KẾT THÚC</label>
                            <input type="time" id="endTime" value="20:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>
                    <button onclick="calculateMoney()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg transition text-sm cursor-pointer shadow-sm">
                        Cập nhật thông tin ca
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-md font-semibold text-slate-900 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i class="fa-solid fa-user-plus text-emerald-500"></i> Thêm người chơi ("Cầu")
                </h2>
                <form id="playerForm" class="space-y-4" onsubmit="addPlayer(event)">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">TÊN NGƯỜI CHƠI</label>
                        <input type="text" id="playerName" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Nhập tên hoặc biệt danh">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">VÀO LÚC</label>
                            <input type="time" id="playerIn" value="18:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">RA LÚC</label>
                            <input type="time" id="playerOut" value="20:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">TIỀN RIÊNG (Nước, Vợt thuê...) (đ)</label>
                        <input type="number" id="playerPrivate" value="0" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded-lg transition text-sm cursor-pointer shadow-sm">
                        + Thêm vào danh sách
                    </button>
                </form>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 min-h-[400px] flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                        <h2 class="text-md font-semibold text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-calculator text-amber-500"></i> Bảng phân chia chi phí công bằng
                        </h2>
                        <span id="sessionSummary" class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">Ca: 120 phút | Tổng: 300K</span>
                    </div>

                    <div class="overflow-x-auto hidden sm:block">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-100 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                    <th class="py-3 pl-2">Tên</th>
                                    <th class="py-3">Thời gian chơi</th>
                                    <th class="py-3 text-right">Tiền sân/cầu</th>
                                    <th class="py-3 text-right">Phát sinh riêng</th>
                                    <th class="py-3 text-right text-indigo-600 font-bold">Tổng Nhận</th>
                                    <th class="py-3 text-center">Xóa</th>
                                </tr>
                            </thead>
                            <tbody id="playerTableBody" class="divide-y divide-slate-100 text-sm">
                                </tbody>
                        </table>
                    </div>

                    <div id="playerMobileList" class="sm:hidden space-y-3">
                        </div>
                </div>

                <div class="mt-6 pt-4 border-t border-slate-100">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div class="text-center sm:text-left">
                            <span class="text-xs text-slate-400 block">Đơn giá phút hiện tại:</span>
                            <span id="pricePerMinute" class="text-sm font-semibold text-indigo-600">0 đ/phút</span>
                        </div>
                        <button onclick="copyBillText()" class="w-full sm:w-auto bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium px-4 py-2 rounded-xl transition text-sm flex items-center justify-center gap-2 cursor-pointer">
                            <i class="fa-regular fa-copy"></i> Copy Tin Nhắn Đòi Tiền (Zalo)
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Khởi tạo một số dữ liệu mẫu ban đầu để app không bị trống trải
        let players = [
            { id: 1, name: "Anh Tú (Trưởng sân)", inTime: "18:00", outTime: "20:00", privateCost: 15000 },
            { id: 2, name: "Chị Hoa vãng lai", inTime: "18:00", outTime: "19:00", privateCost: 0 },
            { id: 3, name: "Minh Đức (vào muộn)", inTime: "19:00", outTime: "20:00", privateCost: 12000 }
        ];

        // Hàm đổi định dạng giờ "HH:MM" ra số phút trong ngày để dễ tính toán
        function timeToMinutes(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        // Hàm tính số phút chơi thực tế của một người dựa trên giờ vào - giờ ra
        function calculatePlayerDuration(pIn, pOut, sIn, sOut) {
            // Giờ vào thực tế không thể sớm hơn giờ bắt đầu ca
            const actualIn = Math.max(timeToMinutes(pIn), timeToMinutes(sIn));
            // Giờ ra thực tế không thể muộn hơn giờ kết thúc ca
            const actualOut = Math.min(timeToMinutes(pOut), timeToMinutes(sOut));
            
            const duration = actualOut - actualIn;
            return duration > 0 ? duration : 0;
        }

        // HÀM LÝ CHÍNH: TÍNH TOÁN VÀ ĐỔ DỮ LIỆU RA GIAO DIỆN
        function calculateMoney() {
            const courtPrice = parseFloat(document.getElementById('courtPrice').value) || 0;
            const shuttlePrice = parseFloat(document.getElementById('shuttlePrice').value) || 0;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            const totalSharedCost = courtPrice + shuttlePrice;
            const sessionDuration = timeToMinutes(endTime) - timeToMinutes(startTime);

            document.getElementById('sessionSummary').innerText = `Ca: ${sessionDuration} phút | Tổng chung: ${(totalSharedCost/1000).toFixed(0)}K`;

            // Bước 1: Tính tổng số phút hoạt động của cả nhóm cộng lại
            let totalGroupMinutes = 0;
            players.forEach(p => {
                p.playMinutes = calculatePlayerDuration(p.inTime, p.outTime, startTime, endTime);
                totalGroupMinutes += p.playMinutes;
            });

            // Bước 2: Tính đơn giá tiền sân/cầu cho mỗi phút chơi
            const pricePerMin = totalGroupMinutes > 0 ? (totalSharedCost / totalGroupMinutes) : 0;
            document.getElementById('pricePerMinute').innerText = `${Math.round(pricePerMin).toLocaleString('vi-VN')} đ/phút`;

            // Bước 3: Đổ dữ liệu vào bảng PC và danh sách Mobile
            const tbody = document.getElementById('playerTableBody');
            const mobileList = document.getElementById('playerMobileList');
            
            tbody.innerHTML = '';
            mobileList.innerHTML = '';

            if(players.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400">Chưa có người chơi nào. Hãy thêm ở cột trái!</td></tr>`;
                mobileList.innerHTML = `<p class="text-center py-6 text-slate-400 text-sm">Chưa có người chơi nào.</p>`;
                return;
            }

            players.forEach(p => {
                // Tiền sân cầu = số phút chơi thực tế * đơn giá 1 phút
                const sharedBill = p.playMinutes * pricePerMin;
                // Tổng bill = Tiền chung + Tiền nước/vợt riêng
                const totalBill = Math.round(sharedBill + p.privateCost);

                // Lưu lại kết quả vào object để dùng cho hàm copy tin nhắn
                p.finalBill = totalBill; 

                // Render giao diện dòng cho máy tính (PC Table)
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="py-3 pl-2 font-medium text-slate-900">${p.name}</td>
                    <td class="py-3 text-xs text-slate-500">
                        <span class="bg-slate-100 px-1.5 py-0.5 rounded">${p.inTime}-${p.outTime}</span> 
                        <b class="ml-1 text-slate-700">(${p.playMinutes} phút)</b>
                    </td>
                    <td class="py-3 text-right">${Math.round(sharedBill).toLocaleString('vi-VN')} đ</td>
                    <td class="py-3 text-right text-amber-600">${p.privateCost.toLocaleString('vi-VN')} đ</td>
                    <td class="py-3 text-right font-bold text-indigo-600 text-base">${totalBill.toLocaleString('vi-VN')} đ</td>
                    <td class="py-3 text-center">
                        <button onclick="deletePlayer(${p.id})" class="text-red-400 hover:text-red-600 transition cursor-pointer">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);

                // Render giao diện Thẻ cho Điện thoại (Mobile Responsive)
                const card = document.createElement('div');
                card.className = "bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center shadow-xs";
                card.innerHTML = `
                    <div>
                        <h4 class="font-bold text-slate-900 text-sm">${p.name}</h4>
                        <p class="text-xs text-slate-500 mt-0.5">Thời gian: ${p.inTime} - ${p.outTime} (${p.playMinutes} phút)</p>
                        ${p.privateCost > 0 ? `<p class="text-xs text-amber-600 mt-0.5">Phát sinh riêng: ${p.privateCost.toLocaleString('vi-VN')}đ</p>` : ''}
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <div>
                            <span class="text-xs text-slate-400 block">Tổng nhận</span>
                            <span class="font-bold text-indigo-600">${totalBill.toLocaleString('vi-VN')}đ</span>
                        </div>
                        <button onclick="deletePlayer(${p.id})" class="text-red-400 hover:text-red-500 p-1 text-sm cursor-pointer">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                mobileList.appendChild(card);
            });
        }

        // Hàm thêm người chơi mới từ Form nhập liệu
        function addPlayer(e) {
            e.preventDefault(); // Chặn tải lại trang khi submit form
            
            const name = document.getElementById('playerName').value;
            const inTime = document.getElementById('playerIn').value;
            const outTime = document.getElementById('playerOut').value;
            const privateCost = parseFloat(document.getElementById('playerPrivate').value) || 0;

            const newPlayer = {
                id: Date.now(), // Tạo ID độc nhất dựa trên timestamp
                name: name,
                inTime: inTime,
                outTime: outTime,
                privateCost: privateCost
            };

            players.push(newPlayer);
            calculateMoney(); // Tính toán lại toàn bộ

            // Reset riêng form điền tên và tiền phát sinh cho người tiếp theo
            document.getElementById('playerName').value = '';
            document.getElementById('playerPrivate').value = '0';
            document.getElementById('playerName').focus(); // đưa con trỏ chuột về ô nhập tên
        }

        // Hàm xóa người chơi khỏi danh sách
        function deletePlayer(id) {
            if(confirm("Bạn có chắc muốn xóa người chơi này không?")) {
                players = players.filter(p => p.id !== id);
                calculateMoney();
            }
        }

        // HÀM COPPY TIN NHẮN ĐỂ GỬI CHỢ CHO CÁC THÀNH VIÊN QUA ZALO
        function copyBillText() {
            if(players.length === 0) {
                alert("Danh sách đang trống, không có dữ liệu để copy!");
                return;
            }

            let text = `🏸 *BẢNG CHIA TIỀN SÂN CẦU LÔNG* 🏸\n`;
            text += `-----------------------------------\n`;
            players.forEach(p => {
                text += `+ ${p.name} (${p.playMinutes} phút): ${p.finalBill.toLocaleString('vi-VN')}đ\n`;
            });
            text += `-----------------------------------\n`;
            text += `👉 Mọi người vui lòng chuyển khoản cho Trưởng sân nhé! Cảm ơn cả nhà. 🙏`;

            // Lệnh copy text vào khay nhớ tạm (Clipboard) của hệ thống
            navigator.clipboard.writeText(text).then(() => {
                alert("Đã copy tin nhắn tổng hợp thành công! Giờ bạn chỉ cần vào Zalo dán (Ctrl+V) gửi là xong.");
            }).catch(err => {
                alert("Có lỗi khi copy, bạn vui lòng chụp màn hình nha!");
            });
        }

        // Chạy tính toán lần đầu tiên ngay khi trang web vừa tải xong để nạp dữ liệu mẫu
        window.onload = function() {
            calculateMoney();
        }
    </script>
</body>
</html>
